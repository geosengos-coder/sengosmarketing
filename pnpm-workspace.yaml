packages:
  - "frontend"
  - "backend"
  - "database"
  - "packages/*"

# The actual approval gate pnpm enforces in CI (Vercel sets CI=true, which turns
# ignored build scripts from a warning into a hard ERR_PNPM_IGNORED_BUILDS failure).
# Generated by `pnpm approve-builds --all`; keep in sync with onlyBuiltDependencies
# below whenever a new dependency needs its install/postinstall script to run.
allowBuilds:
  '@clerk/shared': true
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true

# Allowlist of dependencies permitted to run install/build scripts (pnpm sandboxes
# the rest by default). Kept minimal and intentional.
onlyBuiltDependencies:
  - "@clerk/shared"
  - "@prisma/client"
  - "@prisma/engines"
  - "esbuild"
  - "prisma"
  - "sharp"
  - "unrs-resolver"

# Force a single React across the workspace. React 19 + react-three-fiber v9 are
# the Next-15-native combination (fixes the RSC/react-server ReactCurrentOwner crash).
overrides:
  react: 19.0.0
  react-dom: 19.0.0
